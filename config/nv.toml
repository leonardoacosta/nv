# Tool fleet MCP servers — each entry is a stdio MCP server launched by the Agent SDK.
# Relative paths in `args` are resolved against NOVA_INSTALL_DIR (~/.local/lib/nova-ts/).
# The `--mcp` flag activates the stdio MCP transport in each service.
[tools.mcp_servers.nova-memory]
command = "node"
args = ["packages/tools/memory-svc/dist/index.js", "--mcp"]

