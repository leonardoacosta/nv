services:
  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - DAEMON_URL=http://host.docker.internal:3443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nova-dashboard.rule=Host(`nova.leonardoacosta.dev`)"
      - "traefik.http.routers.nova-dashboard.entrypoints=web"
      - "traefik.http.services.nova-dashboard.loadbalancer.server.port=3000"
    networks:
      - homelab

networks:
  homelab:
    external: true
