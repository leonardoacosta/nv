services:
  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - DAEMON_URL=http://host.docker.internal:8400
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nova-dashboard.rule=Host(`nova.leonardoacosta.dev`)"
      - "traefik.http.routers.nova-dashboard.entrypoints=websecure"
      - "traefik.http.routers.nova-dashboard.tls=true"
      - "traefik.http.routers.nova-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.nova-dashboard.middlewares=homelab-webapp@file"
      - "traefik.http.services.nova-dashboard.loadbalancer.server.port=3000"
    networks:
      - homelab

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova-local
      POSTGRES_DB: nova
    volumes:
      - nova-pg-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  nova-pg-data:
