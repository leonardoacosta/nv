services:
  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://cortex:cortexdev@host.docker.internal:5436/nova
      - TOOL_ROUTER_URL=http://host.docker.internal:4100
      - MEMORY_SVC_URL=http://host.docker.internal:4101
      - MESSAGES_SVC_URL=http://host.docker.internal:4102
      - META_SVC_URL=http://host.docker.internal:4108
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nova-dashboard.rule=Host(`nova.leonardoacosta.dev`)"
      - "traefik.http.routers.nova-dashboard.entrypoints=websecure"
      - "traefik.http.routers.nova-dashboard.tls=true"
      - "traefik.http.routers.nova-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.nova-dashboard.middlewares=homelab-webapp@file"
      - "traefik.http.services.nova-dashboard.loadbalancer.server.port=3000"
    networks:
      - homelab

networks:
  homelab:
    external: true
